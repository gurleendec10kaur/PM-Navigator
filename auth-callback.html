<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Signing in…</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #f9fafb; color: #6b7280; flex-direction: column; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #e5e7eb; border-top-color: #00a86b;
      border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Completing sign in…</p>
  <script>
    (async () => {
      // Give Supabase a moment to exchange the OAuth code for a session
      await new Promise(r => setTimeout(r, 800));
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user) { window.location.href = 'auth.html'; return; }

      // Route based on whether user has completed role selection
      const { data } = await sb
        .from('user_role_selection')
        .select('role_key, role_label, final_score')
        .eq('user_id', session.user.id)
        .maybeSingle();

      if (data) {
        sessionStorage.setItem('pathpm_role',       data.role_key);
        sessionStorage.setItem('pathpm_role_label', data.role_label);
        sessionStorage.setItem('pathpm_score',      data.final_score);
        window.location.href = 'dashboard.html';
      } else {
        window.location.href = 'welcome.html';
      }
    })();
  </script>
</body>
</html>
